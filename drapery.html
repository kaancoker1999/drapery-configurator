<!doctype html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="utf-8">
<title>Custom Drapery Configurator</title>
<style>
  :root{
    --ground:#F7F5F1;
    --surface:#FFFFFF;
    --ink:#2B2A26;
    --muted:#8A857B;
    --line:#E4E0D7;
    --accent:#1F4D46;
    --accent-tint:#E9F0ED;
    --accent-deep:#153833;
    --danger:#A34632;
    --serif:"Charter","Iowan Old Style","Palatino Linotype",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  html{background:var(--ground);}
  body{
    font-family:var(--sans);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 24px 96px;}

  /* ---------- header ---------- */
  .topnav{display:flex;gap:18px;align-items:center;margin-bottom:22px;font-size:13.5px;}
  .topnav a{color:var(--muted);text-decoration:none;padding:4px 2px;border-bottom:2px solid transparent;}
  .topnav a:hover{color:var(--ink);}
  .topnav a.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent);}
  .topnav .home{margin-right:auto;letter-spacing:.14em;text-transform:uppercase;font-weight:600;font-size:12px;}
  h1{
    font-family:var(--serif);
    font-size:clamp(26px,4vw,38px);
    font-weight:600;
    letter-spacing:-.01em;
    text-wrap:balance;
    margin:2px 0 4px;
  }
  .lede{color:var(--muted);font-size:15px;max-width:60ch;margin-bottom:28px;}

  /* ---------- layout ---------- */
  .grid{display:flex;flex-direction:column;gap:14px;max-width:860px;}

  /* ---------- cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:10px;}

  /* ---------- summary ---------- */
  .summary{padding:18px;}
  .summary h2{font-family:var(--serif);font-size:17px;font-weight:600;margin-bottom:10px;}
  .sumgrp{border-top:1px solid var(--line);padding:8px 0;}
  .sumgrp:first-of-type{border-top:none;padding-top:0;}
  .sumgrp h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:4px 0 6px;font-weight:600;}
  .sumrow{display:flex;justify-content:space-between;gap:16px;font-size:13.5px;padding:2px 0;}
  .sumrow dt{color:var(--muted);}
  .sumrow dd{text-align:right;font-weight:500;max-width:60%;}
  .swatch-dot{display:inline-block;width:11px;height:11px;border-radius:3px;border:1px solid rgba(0,0,0,.18);vertical-align:-1px;margin-right:6px;}
  .pricebar{display:flex;justify-content:space-between;align-items:baseline;border-top:2px solid var(--ink);margin-top:10px;padding-top:12px;}
  .pricebar .lbl{font-size:13px;font-weight:600;}
  .pricebar .amt{font-family:var(--serif);font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;}
  .pricenote{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .cta{
    margin-top:14px;width:100%;padding:13px;border:none;border-radius:8px;
    background:var(--accent);color:#fff;font-size:15px;font-weight:600;font-family:var(--sans);
    cursor:pointer;transition:background .15s;
  }
  .cta:hover{background:var(--accent-deep);}
  .cta:focus-visible{outline:3px solid var(--accent-tint);outline-offset:2px;}
  .cta[disabled]{background:#C9C4B9;cursor:not-allowed;}
  .cta-hint{font-size:12px;color:var(--danger);margin-top:8px;min-height:16px;}

  /* ---------- steps ---------- */
  .steps{display:flex;flex-direction:column;gap:14px;}
  .step{padding:20px 22px;}
  .step-head{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;}
  .step-num{
    flex:none;font-variant-numeric:tabular-nums;
    font-size:12px;font-weight:700;color:var(--accent);
    border:1.5px solid var(--accent);border-radius:999px;
    min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
    padding:0 6px;transform:translateY(4px);
  }
  .step-head h2{font-family:var(--serif);font-size:19px;font-weight:600;}
  .step-sub{color:var(--muted);font-size:13.5px;margin:0 0 14px 38px;max-width:62ch;}
  .step-body{margin-left:38px;}
  @media(max-width:560px){.step-sub,.step-body{margin-left:0;}}

  /* ---------- inputs ---------- */
  input[type=text],select{
    font-family:var(--sans);font-size:15px;color:var(--ink);
    background:#fff;border:1px solid #CFC9BC;border-radius:7px;padding:10px 12px;
  }
  input[type=text]:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  input[type=text]{width:100%;max-width:420px;}
  select{font-variant-numeric:tabular-nums;}

  /* option cards */
  .optrow{display:flex;flex-wrap:wrap;gap:10px;}
  .opt{
    position:relative;flex:1 1 140px;max-width:200px;
    border:1.5px solid var(--line);border-radius:9px;background:#fff;
    padding:12px 14px;cursor:pointer;text-align:left;font-family:var(--sans);
    transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:#B9B2A2;}
  .opt[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-tint);}
  .opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .opt .t{display:block;font-size:14.5px;font-weight:600;}
  .opt .d{display:block;font-size:12.5px;color:var(--muted);margin-top:2px;}
  .opt .p{display:block;font-size:12px;font-weight:700;color:var(--accent);margin-top:4px;font-variant-numeric:tabular-nums;}
  .opt-img{
    display:block;width:100%;aspect-ratio:1/1;margin-bottom:10px;
    border-radius:6px;overflow:hidden;background:#EFEBE2;
    border:1px solid rgba(0,0,0,.06);
  }
  .opt-img svg{display:block;width:100%;height:100%;}

  /* dimensions */
  .dims{display:flex;gap:22px;flex-wrap:wrap;}
  .dim label{display:block;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .dim .pair{display:flex;gap:8px;}
  .dim-note{font-size:12px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums;}

  /* colors */
  .color-tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .color-tools input[type=text]{max-width:220px;padding:8px 11px;font-size:14px;}
  .famrow{display:flex;gap:6px;flex-wrap:wrap;}
  .fam{
    font-family:var(--sans);font-size:12px;padding:5px 10px;border-radius:999px;
    border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink);
  }
  .fam[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
  .fam:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  .swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px;max-height:300px;overflow-y:auto;padding:2px;}
  .sw{
    aspect-ratio:1;border-radius:7px;border:1px solid rgba(0,0,0,.15);cursor:pointer;position:relative;padding:0;
  }
  .sw:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .sw[aria-pressed="true"]::after{
    content:"";position:absolute;inset:-4px;border:2px solid var(--accent);border-radius:10px;
  }
  .sw[aria-pressed="true"]::before{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.55);
  }
  .color-chosen{margin-top:10px;font-size:13.5px;}
  .color-chosen b{font-weight:600;}
  .color-count{font-size:12px;color:var(--muted);margin-left:auto;}

  /* back panel block */
  .backpanel{
    border-left:3px solid var(--accent);border-radius:10px;
    background:linear-gradient(0deg,rgba(31,77,70,.035),rgba(31,77,70,.035)),var(--surface);
  }
  .backpanel .tag{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent);background:var(--accent-tint);border-radius:5px;padding:3px 8px;margin-bottom:10px;
  }
  .inherit-note{
    font-size:12.5px;color:var(--muted);background:var(--ground);
    border:1px dashed #D5CFC2;border-radius:7px;padding:8px 12px;margin:14px 0;
  }
  .subq{margin-top:20px;}
  .subq h3{font-size:14.5px;font-weight:600;margin-bottom:10px;}
  .subq h3 .qref{color:var(--muted);font-weight:500;font-size:12px;margin-left:6px;}
  [hidden]{display:none !important;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>

<div class="wrap">
  <nav class="topnav">
    <a class="home" href="index.html">blinds.com · new product prototype</a>

  <h1>Custom Drapery Configurator</h1>

  <div class="grid">

    <div class="steps" id="steps"></div>

    <div class="card summary">

      <button class="cta" id="cta">Add to Cart</button>
      <p class="cta-hint" id="cta-hint"></p>
    </div>
  </div>
</div>

const PRODUCT_TYPES = [
  ["side","Decorative Side Panel","Frames the window — stationary look"],
  ["full","Full Coverage Drapery","Sized to fully cover and operate"],
];

const EIGHTHS = ["0","1/8","1/4","3/8","1/2","5/8","3/4","7/8"];
const LIMITS = { wMin:18, wMax:192, hMin:24, hMax:120 };

/* ================= STATE ================= */

function defaultPanel(){
  return { ptype:null, w:60, wf:0, h:84, hf:0, color:null, pleat:null, liner:null };
}
const state = {
  name:"",
  draw:null,          // oneway | split
  mount:null,         // ceiling | wall
  panels:"single",    // single | double
  hw:null,            // none | rod | track
  front: defaultPanel(),
  back:  defaultPanel(),
  colorFilter: { front:{fam:"All", q:""}, back:{fam:"All", q:""} },
};

/* ================= HELPERS ================= */

const $  = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

function inches(p){ return { w: p.w + p.wf/8, h: p.h + p.hf/8 }; }
function fmtSize(p){
  const f8 = f => f ? " " + EIGHTHS[f] : "";
  return `${p.w}${f8(p.wf)}" W × ${p.h}${f8(p.hf)}" H`;
}
function colorOf(p){ return COLORS.find(c => c.name === p.color) || null; }

/* ================= BUILD UI ================= */

/* ---- square option-tile illustrations ---- */
const TILE = {
  wall:"#EFEBE2", ceil:"#E0D9CA", glass:"#CFE0E8", frame:"#FFFFFF",
  fab:"#D6C9AC", fabD:"#BCAC8C", sheer:"#EDE7D8", track:"#57554F", sun:"#F2E3AE",
};

function tileDrape(x, y, w, h, {fill=TILE.fab, dark=TILE.fabD, opacity=1, n=0} = {}){
  n = n || Math.max(2, Math.round(w/7));
  let s = `<g opacity="${opacity}">`;
  for (let i = 0; i < n; i++)
    s += `<rect x="${(x+i*w/n).toFixed(1)}" y="${y}" width="${(w/n+.5).toFixed(1)}" height="${h}" fill="${i%2 ? dark : fill}"/>`;
  return s + `</g>`;
}
function tileWindow(glass=TILE.glass, sun=0){
  let s = `<rect x="20" y="24" width="60" height="58" fill="${TILE.frame}" rx="2"/>
    <rect x="24" y="28" width="52" height="50" fill="${glass}"/>`;
  if (sun > 0) s += `<circle cx="63" cy="41" r="7" fill="${TILE.sun}" opacity="${sun}"/>`;
  return s + `<line x1="50" y1="28" x2="50" y2="78" stroke="#fff" stroke-width="3"/>
    <line x1="24" y1="53" x2="76" y2="53" stroke="#fff" stroke-width="3"/>`;
}
const tileTrack = (y=16) => `<rect x="10" y="${y}" width="80" height="4" rx="2" fill="${TILE.track}"/>`;
const tileArrow = (x1, x2, y=91) => {
  const head = x2 > x1 ? `M${x2-5} ${y-3} L${x2} ${y} L${x2-5} ${y+3}` : `M${x2+5} ${y-3} L${x2} ${y} L${x2+5} ${y+3}`;
  return `<path d="M${x1} ${y} L${x2} ${y} ${head}" stroke="${TILE.track}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
};
const tile = inner =>
  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="100" height="100" fill="${TILE.wall}"/>${inner}</svg>`;

function pleatTile(type){
  const L = TILE.fab, D = TILE.fabD;
  let s = tileTrack(10);
  if (type === "ripple"){
    // continuous ripple: aligned folds + rounded caps along the top edge
    s += tileDrape(10, 20, 80, 72, {n:10});
    for (let x = 10; x < 90; x += 16)
      s += `<path d="M${x} 21 a8 6 0 0 1 16 0 Z" fill="${L}" stroke="${D}" stroke-width="1.2"/>`;
  } else {
    // pinch pleats, reference style: smooth panel, tacked pinch with fingers
    // fanning up to the top edge, a soft fabric column falling under each pleat
    const FINGER = "#CFC0A0", EDGE = "#A8966E", TACK = "#82704E";
    const per = {single:1, double:2, triple:3, euro:3}[type] || 1;
    s += `<rect x="10" y="20" width="80" height="72" fill="${L}"/>`;
    for (const cx of [22, 50, 78])
      for (const dx of [-6, 3])
        s += `<rect x="${cx+dx}" y="40" width="3.5" height="52" fill="${D}" opacity=".65"/>`;
    s += `<rect x="10" y="40" width="80" height="1.5" fill="${D}" opacity=".35"/>`;
    for (const cx of [22, 50, 78]){
      if (type === "euro"){
        // euro: tacked at the very top, fan opening downward
        for (let k = 0; k < 3; k++){
          const bx = cx + (k-1)*7;
          s += `<path d="M${cx-1.5} 20 L${(bx-3).toFixed(1)} 40 L${(bx+3).toFixed(1)} 40 L${cx+1.5} 20 Z" fill="${FINGER}" stroke="${EDGE}" stroke-width=".8"/>`;
        }
        s += `<rect x="${cx-3}" y="18.5" width="6" height="4" rx="2" fill="${TACK}"/>`;
      } else {
        // pinch below, fingers flaring up and out
        for (let k = 0; k < per; k++){
          const tx = cx + (k - (per-1)/2)*7;
          s += `<path d="M${cx-1.5} 40 L${(tx-3.2).toFixed(1)} 20 L${(tx+3.2).toFixed(1)} 20 L${cx+1.5} 40 Z" fill="${FINGER}" stroke="${EDGE}" stroke-width=".8"/>`;
        }
        s += `<rect x="${cx-3}" y="37.5" width="6" height="4" rx="2" fill="${TACK}"/>`;
      }
    }
  }
  s += `<ellipse cx="50" cy="93.5" rx="42" ry="2.5" fill="rgba(0,0,0,.08)"/>`;
  return tile(s);
}

function optImg(kind, val){
  switch (kind){
    case "ptype":
      return val === "side"
        ? tile(tileTrack() + tileWindow(TILE.glass, .9) + tileDrape(8,20,15,70) + tileDrape(77,20,15,70))
        : tile(tileTrack() + tileWindow() + tileDrape(8,20,39,70) + tileDrape(53,20,39,70));
    case "draw":
      return val === "oneway"
        ? tile(tileTrack() + tileWindow(TILE.glass, .9) + tileDrape(8,20,42,66) + tileArrow(56,84))
        : tile(tileTrack() + tileWindow(TILE.glass, .9) + tileDrape(8,20,22,66) + tileDrape(70,20,22,66) + tileArrow(46,32) + tileArrow(54,68));
    case "mount":
      return val === "ceiling"
        ? tile(`<rect x="0" y="0" width="100" height="9" fill="${TILE.ceil}"/>` + tileWindow(TILE.glass, .9) + tileTrack(10) + tileDrape(6,14,16,78) + tileDrape(78,14,16,78))
        : tile(tileWindow(TILE.glass, .9) + `<rect x="26" y="17" width="4" height="8" fill="${TILE.track}"/><rect x="70" y="17" width="4" height="8" fill="${TILE.track}"/>` + tileTrack(15) + tileDrape(6,19,16,70) + tileDrape(78,19,16,70));
    case "pleat":
      return pleatTile(val);
    case "liner": {
      // drapery panel with its bottom corner folded back to reveal the liner
      const cfg = {
        none:     {sun:.95, glass:TILE.glass, lin:"#EADFC6"},
        white:    {sun:.4,  glass:TILE.glass, lin:"#FFFFFF"},
        blackout: {sun:0,   glass:"#7E939D",  lin:"#3A3936"},
      }[val];
      let inner = tileTrack(12) + tileWindow(cfg.glass, cfg.sun);
      inner += tileDrape(10, 18, 42, 74);
      inner += `<path d="M52 92 L52 62 L26 92 Z" fill="${cfg.lin}" stroke="rgba(0,0,0,.18)" stroke-width="1"/>`;
      inner += `<path d="M52 62 L26 92" stroke="rgba(0,0,0,.12)" stroke-width="2" fill="none"/>`;
      return tile(inner);
    }
    case "panels": {
      if (val === "single")
        return tile(tileTrack(14) + tileWindow(TILE.glass, .9) + tileDrape(8,18,30,74));
      let inner = tileTrack(12);
      inner += `<rect x="14" y="18" width="72" height="3" rx="1.5" fill="#8B877D"/>`;
      inner += tileWindow(TILE.glass, .6);
      inner += tileDrape(20, 23, 62, 64, {fill:"#F3EEE1", dark:"#E0D7C2", opacity:.85, n:8});
      inner += tileDrape(6, 16, 34, 76);
      return tile(inner);
    }
    case "hw": {
      if (val === "track"){
        // track close-up: profile, end stops, carriers + hooks, wand
        let inner = `<rect x="6" y="22" width="88" height="7" rx="3.5" fill="${TILE.track}"/>`;
        inner += `<rect x="6" y="21" width="4" height="9" rx="1.5" fill="#3E3C38"/><rect x="90" y="21" width="4" height="9" rx="1.5" fill="#3E3C38"/>`;
        for (let i = 0; i < 7; i++){
          const x = (16 + i*68/6).toFixed(1);
          inner += `<line x1="${x}" y1="29" x2="${x}" y2="34" stroke="${TILE.track}" stroke-width="1.6"/>`;
          inner += `<circle cx="${x}" cy="36" r="2.4" fill="${TILE.track}"/>`;
        }
        inner += tileDrape(8, 39, 84, 54);
        inner += `<line x1="88" y1="31" x2="97" y2="74" stroke="${TILE.track}" stroke-width="2.2" stroke-linecap="round"/>`;
        return tile(inner);
      }
      if (val === "rod"){
        // rod close-up: round bar, finials, rings
        let inner = `<rect x="10" y="24" width="80" height="5" rx="2.5" fill="${TILE.track}"/>`;
        inner += `<circle cx="8" cy="26.5" r="4.5" fill="#3E3C38"/><circle cx="92" cy="26.5" r="4.5" fill="#3E3C38"/>`;
        for (let i = 0; i < 7; i++){
          const x = (18 + i*64/6).toFixed(1);
          inner += `<circle cx="${x}" cy="30" r="4" fill="none" stroke="${TILE.track}" stroke-width="2"/>`;
        }
        inner += tileDrape(8, 36, 84, 57);
        return tile(inner);
      }
      // no hardware: pin hooks exposed, dashed outline where the rod/track would go
      let inner = `<rect x="6" y="22" width="88" height="7" rx="3.5" fill="none" stroke="#B3AA97" stroke-width="2" stroke-dasharray="6 4"/>`;
      for (let i = 0; i < 7; i++){
        const x = 16 + i*68/6;
        inner += `<path d="M${x.toFixed(1)} 39 v-4 a3 3 0 0 1 3 -3" fill="none" stroke="#8B8477" stroke-width="1.8" stroke-linecap="round"/>`;
      }
      inner += tileDrape(8, 39, 84, 54);
      return tile(inner);
    }
  }
  return "";
}

function optButtons(group, items){
  const kind = group.split(".").pop();
  return `<div class="optrow" role="group">` + items.map(([val, t, d, priceLabel]) =>
    `<button type="button" class="opt" data-group="${group}" data-val="${val}" aria-pressed="false">
       <span class="opt-img" aria-hidden="true">${optImg(kind, val)}</span>
       <span class="t">${t}</span><span class="d">${d}</span>
       ${priceLabel ? `<span class="p">${priceLabel}</span>` : ""}
     </button>`).join("") + `</div>`;
}

function numSelect(id, from, to, sel){
  let o = "";
  for (let i = from; i <= to; i++) o += `<option value="${i}" ${i===sel?"selected":""}>${i}</option>`;
  return `<select id="${id}" aria-label="whole inches">${o}</select>`;
}
function fracSelect(id){
  return `<select id="${id}" aria-label="eighths of an inch">` +
    EIGHTHS.map((f,i)=>`<option value="${i}">${f}″</option>`).join("") + `</select>`;
}

function dimsBlock(side){
  return `<div class="dims">
    <div class="dim"><label for="${side}-w">Width</label>
      <div class="pair">${numSelect(side+"-w", LIMITS.wMin, LIMITS.wMax, 60)}${fracSelect(side+"-wf")}</div>
      <p class="dim-note">${LIMITS.wMin}″ – ${LIMITS.wMax}″</p></div>
    <div class="dim"><label for="${side}-h">Height</label>
      <div class="pair">${numSelect(side+"-h", LIMITS.hMin, LIMITS.hMax, 84)}${fracSelect(side+"-hf")}</div>
      <p class="dim-note">${LIMITS.hMin}″ – ${LIMITS.hMax}″</p></div>
  </div>`;
}

function colorBlock(side){
  return `<div class="color-tools">
      <input type="text" id="${side}-csearch" placeholder="Search ${COLORS.length} colors…" aria-label="search colors">
      <span class="color-count" id="${side}-ccount"></span>
    </div>
    <div class="famrow" id="${side}-fams"></div>

}

function stepCard(num, title, sub, body, id=""){

    <div class="step-body">${body}</div>

}

$("#steps").innerHTML = [

/* ---- color pickers ---- */
function buildColorUI(side){
  const famrow = $(`#${side}-fams`);
  famrow.innerHTML = ["All", ...FAMILIES.map(f=>f[0])]
    .map(f => `<button type="button" class="fam" data-side="${side}" data-fam="${esc(f)}" aria-pressed="${f==="All"}">${f}</button>`).join("");
  renderSwatches(side);
}
function renderSwatches(side){
  const {fam, q} = state.colorFilter[side];
  const query = q.trim().toLowerCase();
  const list = COLORS.filter(c =>
    (fam === "All" || c.fam === fam) &&
    (!query || c.name.toLowerCase().includes(query) || c.fam.toLowerCase().includes(query)));
  $(`#${side}-swatches`).innerHTML = list.map(c =>
    `<button type="button" class="sw" role="option" data-side="${side}" data-color="${esc(c.name)}"
       style="background:${c.hex}" title="${esc(c.name)} · ${c.fam}"
       aria-pressed="${state[side].color === c.name}" aria-label="${esc(c.name)}"></button>`).join("");
  $(`#${side}-ccount`).textContent = `${list.length} of ${COLORS.length}`;
}
buildColorUI("front");
buildColorUI("back");

/* ================= EVENTS ================= */

document.addEventListener("click", e => {
  const opt = e.target.closest(".opt");
  if (opt){
    const [a, b] = opt.dataset.group.split(".");
    if (b) state[a][b] = opt.dataset.val; else state[a] = opt.dataset.val;
    $$(`.opt[data-group="${opt.dataset.group}"]`).forEach(o =>
      o.setAttribute("aria-pressed", o === opt ? "true" : "false"));
    if (opt.dataset.group === "panels")
      $("#back-section").hidden = state.panels !== "double";
    update();
    return;
  }
  const fam = e.target.closest(".fam");
  if (fam){
    state.colorFilter[fam.dataset.side].fam = fam.dataset.fam;
    $$(`.fam[data-side="${fam.dataset.side}"]`).forEach(f =>
      f.setAttribute("aria-pressed", f === fam ? "true" : "false"));
    renderSwatches(fam.dataset.side);
    return;
  }
  const sw = e.target.closest(".sw");
  if (sw){
    state[sw.dataset.side].color = sw.dataset.color;
    $$(`.sw[data-side="${sw.dataset.side}"]`).forEach(s =>
      s.setAttribute("aria-pressed", s === sw ? "true" : "false"));
    update();
  }
});

document.addEventListener("input", e => {
  const id = e.target.id;
  if (id === "win-name"){ state.name = e.target.value; update(); return; }
  if (id.endsWith("-csearch")){
    const side = id.split("-")[0];
    state.colorFilter[side].q = e.target.value;
    renderSwatches(side);
    return;
  }
  const m = id.match(/^(front|back)-(w|h|wf|hf)$/);
  if (m){ state[m[1]][m[2]] = +e.target.value; update(); }
});

$("#cta").addEventListener("click", () => {
  const btn = $("#cta");
  btn.textContent = "Added to Cart ✓";
  setTimeout(() => { btn.textContent = "Add to Cart"; }, 1800);
});

/* ================= PRICE ================= */

/* price-grid lookup: round size UP to the next breakpoint (standard practice) */
function ceilIdx(bps, v){
  for (let i = 0; i < bps.length; i++) if (v <= bps[i]) return i;
  return bps.length - 1;
}
function groupOf(p){
  const c = colorOf(p);
  return c ? FAMILY_GROUP[c.fam] : "A";     // group A grid shown until a color is picked
}
function panelPrice(p){
  const {w, h} = inches(p);
  const hi = ceilIdx(DH, h), wi = ceilIdx(DW, w);
  const base = DBASE[groupOf(p)][hi][wi];               // Wave grid price
  const pct = PLEAT_PCT[p.pleat] || 0;
  return Math.round(base * (100 + pct)) / 100;
}
function linerPrice(p){
  if (p.liner !== "white" && p.liner !== "blackout") return 0;
  const {w, h} = inches(p);
  return DLINERS[p.liner][ceilIdx(DH, h)][ceilIdx(DW, w)];
}
function hardwarePrice(){
  if (state.hw !== "rod" && state.hw !== "track") return 0;
  return DHW[state.hw][ceilIdx(DW, inches(state.front).w)];
}
function pleatDesc(p){
  const name = label.pleat[p.pleat] ?? "Wave";
  const pct = PLEAT_PCT[p.pleat] || 0;
  return pct ? `${name} (+${pct}%)` : name;
}
function priceBreakdown(){
  const rows = [
    ["Front panel", `${pleatDesc(state.front)} · group ${groupOf(state.front)} · ${fmtSize(state.front)}`, panelPrice(state.front)],
  ];
  if (state.front.liner === "white" || state.front.liner === "blackout")
    rows.push(["Front liner", label.liner[state.front.liner], linerPrice(state.front)]);
  if (state.panels === "double"){
    rows.push(["Back panel", `${pleatDesc(state.back)} · group ${groupOf(state.back)} · ${fmtSize(state.back)}`, panelPrice(state.back)]);
    if (state.back.liner === "white" || state.back.liner === "blackout")
      rows.push(["Back liner", label.liner[state.back.liner], linerPrice(state.back)]);
  }
  if (state.hw === "rod" || state.hw === "track")
    rows.push(["Hardware", (state.hw === "rod" ? "Rod" : "Track") + ", cut to width", hardwarePrice()]);
  return rows;
}
function totalPrice(){
  return priceBreakdown().reduce((t, r) => t + r[2], 0);
}

const label = {
  ptype:{side:"Decorative Side Panel", full:"Full Coverage Drapery"},
  draw:{oneway:"One Way Draw", split:"Split Draw"},
  mount:{ceiling:"Ceiling Mount", wall:"Wall Mount"},
  pleat:Object.fromEntries(PLEATS.map(p=>[p[0],p[1]])),

};
const dash = `<span style="color:var(--muted)">—</span>`;

function panelRows(p){

    <div class="sumrow"><dt>Liner</dt><dd>${label.liner[p.liner] ?? dash}</dd></div>`;
}

function renderSummary(){
  let s = `<div class="sumgrp">
    <div class="sumrow"><dt>Window</dt><dd>${state.name ? esc(state.name) : dash}</dd></div>
    <div class="sumrow"><dt>Draw</dt><dd>${label.draw[state.draw] ?? dash}</dd></div>
    <div class="sumrow"><dt>Mount</dt><dd>${label.mount[state.mount] ?? dash}</dd></div>
    <div class="sumrow"><dt>Configuration</dt><dd>${state.panels==="double"?"Front & Back Panel":"Single Panel"}</dd></div>
    <div class="sumrow"><dt>Hardware</dt><dd>${state.hw==null ? dash : state.hw==="none"?"None":state.hw==="rod"?"Rod":"Track"}</dd></div>
  </div>
  <dl class="sumgrp"><h3>${state.panels==="double"?"Front panel":"Panel"}</h3>${panelRows(state.front)}</dl>`;
  if (state.panels === "double")
    s += `<dl class="sumgrp"><h3>Back panel</h3>${panelRows(state.back)}</dl>`;
  s += `<div class="sumgrp"><h3>Price breakdown</h3>` + priceBreakdown().map(([lbl, sub, amt]) => `
    <div class="sumrow"><dt>${lbl} <span style="font-size:11.5px">· ${sub}</span></dt>
    <dd style="font-variant-numeric:tabular-nums">$${amt.toFixed(2)}</dd></div>`).join("") + `</div>`;
  $("#summary").innerHTML = s;
}

/* ================= VALIDATION + UPDATE ================= */

function missing(){
  const m = [];
  if (!state.name.trim()) m.push("window name (1)");
  if (!state.front.ptype) m.push("drapery style (2)");
  if (!state.draw) m.push("draw type (3)");
  if (!state.mount) m.push("mount (4)");
  if (!state.front.color) m.push("color (6)");
  if (!state.front.pleat) m.push("pleat (7)");
  if (!state.front.liner) m.push("liner (8)");
  if (state.panels === "double"){
    if (!state.back.ptype) m.push("back style (9a)");
    if (!state.back.color) m.push("back color (9a)");
    if (!state.back.pleat) m.push("back pleat (9a)");
    if (!state.back.liner) m.push("back liner (9a)");
  }
  if (state.hw == null) m.push("hardware (10)");
  return m;
}

function update(){
  $("#inherit-vals").textContent =
    `${label.draw[state.draw] ?? "draw not chosen yet"} · ${label.mount[state.mount] ?? "mount not chosen yet"}`;
  for (const side of ["front","back"]){
    const c = colorOf(state[side]);
    $(`#${side}-chosen`).innerHTML = c
      ? `<span class="swatch-dot" style="background:${c.hex}"></span>Selected: <b>${c.name}</b> · ${c.fam} · Price group ${FAMILY_GROUP[c.fam]}`
      : "No color selected yet.";
  }
  renderSummary();
  $("#price").textContent = "$" + totalPrice().toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  const miss = missing();
  $("#cta").disabled = miss.length > 0;
  $("#cta-hint").textContent = miss.length
    ? "Still needed: " + miss.slice(0,4).join(", ") + (miss.length>4 ? ` +${miss.length-4} more` : "")
    : "";
}
update();
</script>

</html>
